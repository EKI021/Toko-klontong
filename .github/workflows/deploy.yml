name: CI/CD Pipeline to LXD Container

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Tambahkan langkah Tailscale agar GitHub Actions masuk ke jaringan Anda
    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TS_AUTHKEY }}

    # 2. Konfigurasi SSH menggunakan port 2222 (port proxy LXC)
    - name: Deploy to Container via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: 22
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          echo "Koneksi SSH ke container LXC berhasil!"
          cd /root/Toko-klontong || exit 1
          git pull origin main
